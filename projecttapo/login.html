<html lang="en">
<head>
  <meta charset="UTF-8">

</head>
<body>
  <nav>
    <div class="logo">
      <a class="ac" href="tapo.html"
          ><svg class="site-logo" width="250" height="60" viewBox="0 0 180 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="opt1Text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#CFD5DF" />
    </linearGradient>
    <linearGradient id="opt1Glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3B30" />
      <stop offset="100%" stop-color="#FF9F1C" />
    </linearGradient>
  </defs>
  <path d="M6 16 L16 6 H34 L44 16 V34 L34 44 H16 L6 34 Z" fill="none" stroke="url(#opt1Glow)" stroke-width="2.5" stroke-linejoin="round"/>
  
  <path d="M18 15 H32 V19 H22 V23 H30 V27 H22 V35 H18 Z" fill="#FFFFFF" />
  
  <text x="54" y="33" font-family="'Impact', 'Arial Black', sans-serif" font-size="23" font-style="italic" font-weight="900" fill="url(#opt1Text)" letter-spacing="1">FIGHT</text>
  <text x="110" y="33" font-family="'Impact', 'Arial Black', sans-serif" font-size="23" font-style="italic" font-weight="900" fill="url(#opt1Glow)" letter-spacing="1">OHOLIC</text>
</svg></a>
    </div>
    <ul>
     <li><a class="c" href="tapo.html">Home</a></li>
        <li><a class="c" href="forum.html">Forum</a></li>
        <li><a class="c" href="login.html">Login</a></li>
        <li><a class="c" href="contactpage.html">Contact</a></li>
    </ul>
  </nav>

  <main class="page">
    <section class="login-card">
      <span class="badge">Fightoholic Login</span>
      <h1>Welcome back</h1>
      <p class="intro">Sign in to save picks, follow fighters, and keep your Fightoholic profile ready for fight night.</p>

      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" required>
        </div>

        <div class="login-options">
          <label>
            <input type="checkbox">
            Remember me
          </label>
          <a href="#">Forgot password?</a>
        </div>

        <button class="login-btn" type="submit">Login</button>
        <div class="login-status" id="loginStatus">Login form submitted.</div>
      </form>

      <p class="signup">New here? <a href="#">Create an account</a></p>
    </section>
      <script>
    document.getElementById("loginForm").addEventListener("submit", function (event) {
    event.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const status = document.getElementById("loginStatus");

    status.style.display = "block";

    if (!email.endsWith("@gmail.com")) {
        status.textContent = "Please enter a Gmail address.";
        return;
    }

    if (password.length < 8 || !password.includes("@")) {
        status.textContent =
            "Password must be at least 8 characters and include @.";
        return;
    }

    status.textContent = "Login successful.";
});
  </script>
  </main>

  <footer>
    <p>&copy;Fightoholic</p>
  </footer>
</body>
</html>
